# ──────────────────────────────────────────────────────────────────────────────
# FIDA ERP — Nginx reverse proxy для erp.fida-group.kz
# /etc/nginx/sites-available/erp.fida-group.kz.conf  →  symlink в sites-enabled
#
# Контейнеры слушают только на 127.0.0.1 (см. docker-compose.prod.yml):
#   frontend → 127.0.0.1:3000   |   backend → 127.0.0.1:3001 (глобальный префикс /api)
#
# Порядок получения сертификата — см. DEPLOY.md (сначала certbot, потом этот HTTPS-блок).
# ──────────────────────────────────────────────────────────────────────────────

# ── HTTP :80 — ACME challenge + редирект на HTTPS ─────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name erp.fida-group.kz;

    # Webroot для выпуска/продления Let's Encrypt сертификата
    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ── HTTPS :443 — reverse proxy ────────────────────────────────────────────────
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name erp.fida-group.kz;

    # Let's Encrypt (стандартные пути certbot)
    ssl_certificate     /etc/letsencrypt/live/erp.fida-group.kz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/erp.fida-group.kz/privkey.pem;

    # Inline SSL-настройки (не зависят от certbot-генерируемых файлов,
    # чтобы конфиг был валиден при выпуске сертификата через `certbot certonly`).
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;
    add_header Strict-Transport-Security "max-age=31536000" always;

    # Лимит размера тела запроса (загрузка файлов)
    client_max_body_size 20M;

    # Общие proxy-заголовки
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_http_version 1.1;
    proxy_set_header Upgrade    $http_upgrade;
    proxy_set_header Connection "upgrade";

    # ── API → NestJS ──────────────────────────────────────────────────────────
    # БЕЗ завершающего слеша в proxy_pass: /api/* проксируется как есть,
    # сохраняя глобальный префикс /api бэкенда.
    location /api/ {
        proxy_pass http://127.0.0.1:3001;
    }

    # ── Всё остальное → Next.js ─────────────────────────────────────────────────
    location / {
        proxy_pass http://127.0.0.1:3000;
    }
}
