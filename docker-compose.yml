version: "3.9"

services:
  postgres:
    image: postgres:15-alpine
    container_name: fida_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: fida
      POSTGRES_PASSWORD: fida_password
      POSTGRES_DB: fida_erp
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fida -d fida_erp"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
